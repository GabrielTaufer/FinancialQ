{% extends 'base_login.html' %}
{% load static %}

{% block css %}
{% endblock css %}

{% block content %}
<div class="login-box">
  <div class="login-logo">
    <a href="../../index2.html"><b>Financial</b>Q</a>
  </div>
  <!-- /.login-logo -->
  <div class="login-box-body">
	<h4 class="login-box-msg">
		Entrar
	</h4>
	<div class="content">
		<form method="post">
		  <div class="form-group has-feedback login-form-group">
			<input type="email" class="form-control login-input" placeholder="Nome de Usuário ou Email">
			<span class="glyphicon glyphicon-user form-control-feedback"></span>
		  </div>
		  <div class="form-group has-feedback login-form-group">
			<input type="password" class="form-control login-input" placeholder="Senha">
			<span class="glyphicon glyphicon-lock form-control-feedback"></span>
		  </div>
		  <div class="row" style="margin-top: 7%;">
			<!-- /.col -->
			<div class="col-md-12">
			  <button type="submit" class="btn btn-primary btn-block btn-flat login-sign-in">Sign In</button>
			</div>
			<!-- /.col -->
		  </div>
		</form>
		<div class="row" style="margin-top: 5%;">
			<div class="col-md-6">				
				<a href="#">Esqueci a senha</a><br>
			</div>
			<div class="col-md-6">
				<a href="/login/new" class="text-center">Não possui conta?</a>
			</div>
		</div>

	</div>


  </div>
  <!-- /.login-box-body -->
</div>
{% endblock content %}
