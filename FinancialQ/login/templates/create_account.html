{% extends 'base_login.html' %}
{% load static %}

{% block css %}
{% endblock css %}

{% block content %}
<div class="login-box">
  <div class="login-logo">
	<a href="../../index2.html"><b>Financial</b>Q</a>
  </div>
  
  <div class="login-box-body">      
	<h4 class="login-box-msg">
		Nova Conta   
	</h4>            
	<div class="content">
		<form method="post">
			<div class="form-group has-feedback login-form-group">
				<input type="text" class="form-control login-input" id="apelido" name="apelido" placeholder="Apelido">
				<span class="glyphicon glyphicon-user form-control-feedback"></span>
			</div>
			<div class="form-group has-feedback login-form-group">
				<input type="email" class="form-control login-input" id="email" name="email" placeholder="Email">
				<span class="fa fa-envelope form-control-feedback"></span>
			</div>
			<div class="form-group has-feedback login-form-group">
				<input type="password" class="form-control login-input" id="senha" name="senha" placeholder="Senha">
				<span class="glyphicon glyphicon-lock form-control-feedback"></span>
			</div>
			<div class="row" style="margin-top: 7%;">
				<div class="col-md-12">
					<button type="submit" class="btn btn-primary btn-block btn-flat login-sign-in">Criar Conta</button>
				</div>
			</div>
		</form>
		<div class="row" style="margin-top: 5%;">
			<div class="col-md-6">				
				<a href="/login"><i class="fa fa-arrow-left"></i> Voltar</a><br>
			</div>
		</div>
	</div>
  </div>
</div>
{% endblock content %}
